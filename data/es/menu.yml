nombres_datos:
  [
    "ingredientes",
    "alergenos",
    "txt_aclaraciones",
    "txt_temporal",
    "grad_alcoholica",
    "vol_ml",
    "edul_gr",
    "pvp_local",
    "pvp_terraza",
    "pvp",
