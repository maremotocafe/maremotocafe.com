    color: "#f0c0c0"
  - nombre: Rones, Whiskies y Licores
    icono: las la-glass-whiskey
    color: "#d1b9e1"
  - nombre: Sin Alcohol
    icono: las la-apple-alt
    color: "#97d295"
    subcategorias:
      - nombre: Cocktails Sin Alcohol
      - nombre: Smoothies
      - nombre: Granizados
      - nombre: Batidos
