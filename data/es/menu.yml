# Iconos obtenidos de https://icons8.com/line-awesome
enable: true
title: Nuestra Carta
description: Encuentra lo que deseas paso a paso
description_icon: las la-info-circle

paso1: "Primero elige una categoría:"
paso2: "Ahora concreta tu búsqueda con una de las siguientes subcategorías:"
